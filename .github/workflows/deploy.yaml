name: Deploy to Vercel

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (tag, branch, or SHA)"
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve ref to SHA
        id: resolve
        run: |
          sha=$(git ls-remote "${{ github.server_url }}/${{ github.repository }}" "${{ inputs.ref }}" | head -1 | cut -f1)
          if [ -z "${sha}" ]; then
            # Try as a raw SHA
            sha="${{ inputs.ref }}"
          fi
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"
          echo "Resolved ref '${{ inputs.ref }}' to SHA ${sha}"

      - name: Create Vercel production deployment and wait for completion
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_ACCESS_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_ORG_ID }}
          GITHUB_REPO_ID: "664563648"
          DEPLOY_REF: ${{ inputs.ref }}
          DEPLOY_SHA: ${{ steps.resolve.outputs.sha }}
        run: |
          echo "Triggering Vercel production deployment for ${DEPLOY_REF} (${DEPLOY_SHA})"

          # Create a production deployment pinned to the exact SHA
          response=$(curl -s -X POST "https://api.vercel.com/v13/deployments?teamId=${VERCEL_TEAM_ID}" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"name\": \"dash0\",
              \"project\": \"${VERCEL_PROJECT_ID}\",
              \"target\": \"production\",
              \"gitSource\": {
                \"type\": \"github\",
                \"ref\": \"${DEPLOY_REF}\",
                \"sha\": \"${DEPLOY_SHA}\",
                \"repoId\": ${GITHUB_REPO_ID}
              }
            }")

          deployment_id=$(echo "${response}" | jq -r '.id')
          if [ -z "${deployment_id}" ] || [ "${deployment_id}" = "null" ]; then
            echo "Failed to create deployment:"
            echo "${response}" | jq .
            exit 1
          fi
          echo "Deployment created: ${deployment_id}"

          # Poll until the deployment reaches a terminal state
          max_attempts=60  # 10 minutes at 10s intervals
          attempt=0

          while [ ${attempt} -lt ${max_attempts} ]; do
            sleep 10
            attempt=$((attempt + 1))

            status=$(curl -sf \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              "https://api.vercel.com/v13/deployments/${deployment_id}?teamId=${VERCEL_TEAM_ID}" \
              | jq -r '.readyState')

            echo "Attempt ${attempt}/${max_attempts}: ${status}"

            case "${status}" in
              READY)
                echo "Vercel production deployment completed successfully."
                exit 0
                ;;
              ERROR|CANCELED)
                echo "Vercel deployment failed with state: ${status}"
                exit 1
                ;;
            esac
          done

          echo "Timed out waiting for Vercel deployment to complete."
          exit 1
